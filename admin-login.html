<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - LUKU LEGIT</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="admin-login" class="admin-login-page">
    <div class="login-page-container">
        <div class="login-card">
          <h1>Admin Access</h1>
          <p>
            Authorized personnel only. Enter your credentials to access the
            administrative dashboard and manage all website operations.
          </p>

          <form id="admin-login-form" class="login-form">
            <input
              type="password"
              id="admin-password"
              placeholder="Enter admin password"
              required
              autocomplete="current-password"
            />
            <button type="submit" class="btn btn-primary">
              Access Dashboard
            </button>
          </form>

          <div id="login-error" class="error-message"></div>
        </div>
      </div>

      <script src="js/script.js"></script>
    </div>
