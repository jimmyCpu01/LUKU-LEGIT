<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - LUKU LEGIT</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="cart">
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-logo">
          <img src="img/luku gold-01.png" alt="Luku Legit Logo" />
          <span>LUKU LEGIT</span>
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="order.html">Order</a></li>
          <li><a href="reviews.html">Reviews</a></li>
        </ul>
      </div>
    </nav>

    <section class="hero">
      <h1>Shopping Cart <span>Manage Items</span></h1>
      <p>Review and manage your selected items before checkout.</p>
    </section>

    <section class="products">
      <div style="max-width: 900px; margin: 0 auto">
        <div
          id="cart-items"
          class="data-list"
          style="margin-bottom: 2rem"
        ></div>
        <div
          style="
            text-align: center;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 2rem;
          "
        >
          <a href="shop.html" class="btn secondary" style="padding: 1rem 2rem"
            >Continue Shopping</a
          >
          <a href="payment.html" class="btn" style="padding: 1rem 2rem"
            >Proceed to Payment</a
          >
        </div>
      </div>
    </section>

    <footer>
      <p>Keep it authentic. © 2026 Luku Legit.</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        const cart = JSON.parse(localStorage.getItem("cart") || "[]");
        const container = document.getElementById("cart-items");

        if (!cart.length) {
          container.innerHTML = "<p>Your cart is empty.</p>";
          return;
        }

        let total = 0;
        cart.forEach((item, idx) => {
          total += item.price;
          const div = document.createElement("div");
          div.className = "data-item";
          div.innerHTML = `
          <p><strong>${item.name}</strong></p>
          <p>Size: ${item.size}</p>
          <p>Condition: ${item.condition}</p>
          <p>Price: Ksh ${item.price}</p>
          <button class="btn btn-small" onclick="removeFromCart(${idx})">Remove</button>
        `;
          container.appendChild(div);
        });

        // Add total
        const totalDiv = document.createElement("div");
        totalDiv.className = "data-item";
        totalDiv.style.fontWeight = "bold";
        totalDiv.style.fontSize = "1.2em";
        totalDiv.innerHTML = `<p>Total: Ksh ${total}</p>`;
        container.appendChild(totalDiv);
      });

      function removeFromCart(idx) {
        let cart = JSON.parse(localStorage.getItem("cart") || "[]");
        cart.splice(idx, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        location.reload();
      }
    </script>
  </body>
</html>
